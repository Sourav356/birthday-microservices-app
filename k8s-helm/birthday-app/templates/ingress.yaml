apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: birthday-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          # Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # Microservices APIs (optional if FE calls them directly via internal DNS, 
          # but usually we expose them for external testing/separate domains)
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3001
          - path: /api/celebration
            pathType: Prefix
            backend:
              service:
                name: celebration-service
                port:
                  number: 3004
