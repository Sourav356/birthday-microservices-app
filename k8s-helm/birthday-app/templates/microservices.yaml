{{- range $serviceName, $service := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  labels:
    app: {{ $serviceName }}
spec:
  replicas: {{ $service.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ $serviceName }}
  template:
    metadata:
      labels:
        app: {{ $serviceName }}
    spec:
      containers:
        - name: {{ $serviceName }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag | default $.Values.global.image.tag }}"
          imagePullPolicy: {{ $service.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: {{ $service.port }}
              protocol: TCP
          env:
            {{- if $service.env }}
            {{- range $key, $value := $service.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            # Global DB connection for services that need it
            {{- if $service.needsDB }}
            - name: DB_HOST
              value: {{ $.Values.global.database.host | quote }}
            - name: DB_PORT
              value: {{ $.Values.global.database.port | quote }}
            - name: DB_USER
              value: {{ $.Values.global.database.user | quote }}
            - name: DB_NAME
              value: {{ $service.dbName | default $.Values.global.database.name | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: password
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $service.port }}
      targetPort: {{ $service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ $serviceName }}
{{- end }}
